name: Weekly Article PR

on:
  schedule:
    - cron: '3 12 * * 2,4'  # Tuesday and Thursday 8:03 AM Eastern (12:03 UTC during EDT)
  workflow_dispatch:          # Manual trigger via Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  create-article-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk --no-save --silent

      - name: Pick topic and generate article
        id: article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-article.js

      - name: Commit and open PR
        if: steps.article.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.article.outputs.branch }}
          NUM: ${{ steps.article.outputs.num }}
          TITLE: ${{ steps.article.outputs.title }}
          ARTICLE_PATH: ${{ steps.article.outputs.article_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add "$ARTICLE_PATH" topic-queue.md
          git diff --staged --quiet || git commit -m "Article #$NUM: $TITLE"
          git push origin "$BRANCH" --force
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -n "$EXISTING" ]; then
            echo "PR already open: $EXISTING"
          else
            gh pr create --title "[Review] Article #$NUM: $TITLE" --body-file .pr-body.md --base main
          fi
